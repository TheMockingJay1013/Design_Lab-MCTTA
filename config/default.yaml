# MC-TTA — paper defaults (CVPR 2024 §4.1)

model:
  backbone: i3d
  feature_dim: 1024
  hidden_dim: 1024
  dropout: 0.5

data:
  num_clips: 10
  clip_len: 8
  resolution: 224
  flow_method: tvl1

pretrain:
  epochs: 30
  batch_size: 8
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4
  scheduler: cosine
  early_stop_patience: 5

adaptation:
  lr: 0.01
  momentum: 0.9
  weight_decay: 1.0e-4
  batch_size: 1
  accum_steps: 64
  alpha: 0.3
  beta: 0.6
  top_k: 5
  lambda1: 1.0
  lambda2: 0.5
  gamma: 0.999
  max_bank_per_class: 512
  shuffle_target: true
  # Stabilization (paper Eq.5 is unnormalized; L_ma can be ~1e6+, drowning L_CE):
  normalize_l_ma: false
  grad_clip_norm: null

# SSFR: default matches paper prose (low entropy = source-friendly).
# Set entropy_mode: high_entropy_threshold to use conf(p) >= beta literally on entropy.
ssfr:
  pairwise_metric: cosine_distance
  entropy_mode: low_entropy_threshold

datasets:
  ucf_hmdb_small:
    num_classes: 5
  ucf_hmdb_full:
    num_classes: 12
  ucf_olympic:
    num_classes: 6
  epic_kitchens:
    num_classes: 8

seed: 42
